<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abed Kazi — Digital Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
[data-theme="dark"] {
  --bg: #080808; --bg2: #111111; --card: rgba(20,20,20,0.95);
  --border: rgba(255,255,255,0.1); --accent: #c8f03c;
  --accent-glow: rgba(200,240,60,0.45); --text: #f0ede6;
  --text2: #a8a8a8; --muted: #777;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; line-height: 1.75; }

nav {
  position: fixed; top:0; left:0; right:0; z-index:200;
  padding: 1.2rem 4rem; background: rgba(10,10,10,0.92);
  backdrop-filter: blur(24px); border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.nav-logo { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--accent); }

.hero {
  min-height: 100vh; padding: 0 4rem 7rem; display: flex; flex-direction: column; justify-content: flex-end;
  position: relative;
}
.hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 75% 25%, rgba(200,240,60,0.18), transparent 65%);
}
h1 {
  font-family: 'Syne', sans-serif; font-size: clamp(4.2rem, 10vw, 8.5rem);
  font-weight: 800; line-height: 0.9; letter-spacing: -0.05em;
}
h1 em { font-style: normal; color: transparent; -webkit-text-stroke: 2.5px var(--accent); }

#gallery { background: var(--bg2); padding: 8rem 4rem; }
.gallery-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 2.2rem;
}
.gallery-item {
  position: relative; border-radius: 18px; overflow: hidden; background: var(--card);
  border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.6);
  transition: all 0.45s ease; cursor: pointer;
}
.gallery-item:hover {
  transform: scale(1.06) translateY(-12px); border-color: var(--accent);
  box-shadow: 0 30px 70px var(--accent-glow);
}
.gallery-item img {
  width: 100%; height: 100%; object-fit: cover; transition: transform 0.7s ease;
}
.gallery-item:hover img { transform: scale(1.18); }
.gallery-item-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.92));
  padding: 2.2rem 1.4rem 1.4rem; color: #fff; font-size: 0.85rem;
  transform: translateY(50%); transition: transform 0.4s ease;
}
.gallery-item:hover .gallery-item-label { transform: translateY(0); }

/* Lightbox */
.lightbox {
  position: fixed; inset: 0; background: rgba(0,0,0,0.96);
  display: none; align-items: center; justify-content: center;
  z-index: 9999; padding: 2rem;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 94vw; max-height: 90vh; border: 12px solid #1a1a1a;
  border-radius: 12px; box-shadow: 0 0 80px var(--accent-glow);
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">AK.</div>
  <ul class="nav-links" style="display:flex; gap:2rem; list-style:none;">
    <li><a href="#gallery" style="color:#aaa; text-decoration:none;">Certificates</a></li>
    <!-- Add other links if needed -->
  </ul>
</nav>

<div class="hero">
  <h1>Abed<br><em>Kazi</em></h1>
  <p class="hero-sub" style="max-width:580px; color:var(--text2); font-size:1.08rem; margin:2.2rem 0 3.5rem;">
    B.Tech Engineering Student at MIT Vishwaprayag University (Class of 2026)
  </p>
  <a href="#gallery" style="background:var(--accent); color:#0a0a0a; padding:1.05rem 2.4rem; border-radius:8px; text-decoration:none; font-weight:700;">View My Certificates →</a>
</div>

<section id="gallery">
  <h2 style="font-family:'Syne',sans-serif; font-size:3rem; margin-bottom:2rem;">My Certificates</h2>
  
  <div class="gallery-grid">
    <!-- Replace titles with your actual certificate names -->
    <div class="gallery-item" onclick="openLightbox(this)">
      <img src="images/cert1.jpg" alt="Cert 1" onerror="this.src='https://via.placeholder.com/600x400/1a1a1a/c8f03c?text=Cert+1+Missing';">
      <div class="gallery-item-label">Coursera • Engineering Physics</div>
    </div>
    <!-- Repeat for cert2.jpg to cert7.jpg and change labels -->
    <!-- Example for your photo (if you want to show it in gallery or about) -->
    <div class="gallery-item" onclick="openLightbox(this)">
      <img src="images/photo.jpg" alt="Abed Kazi Photo" onerror="this.src='https://via.placeholder.com/600x400/1a1a1a/c8f03c?text=Photo+Missing';">
      <div class="gallery-item-label">Profile Photo</div>
    </div>
  </div>
</section>

<div class="lightbox" id="lightbox" onclick="if(event.target===this) closeLightbox()">
  <img id="lightboxImg" src="" alt="" style="max-width:94vw; max-height:90vh;">
</div>

<script>
function openLightbox(el) {
  document.getElementById('lightboxImg').src = el.querySelector('img').src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === "Escape") closeLightbox(); });
</script>
</body>
</html>
