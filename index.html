<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abed Kazi - Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: #f0f0f0;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            font-size: 3.5rem;
            color: #c8f03c;
            margin: 40px 0 10px;
        }
        p {
            font-size: 1.3rem;
            color: #aaa;
            margin-bottom: 50px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .item {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
        }
        .item:hover {
            border-color: #c8f03c;
            transform: scale(1.05);
        }
        .item img {
            width: 100%;
            height: auto;
            display: block;
        }
        .label {
            padding: 15px;
            background: #222;
            font-size: 1rem;
        }
        .lightbox {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border: 10px solid #c8f03c;
            border-radius: 10px;
        }
        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 50px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Abed Kazi</h1>
    <p>B.Tech Engineering Student<br>MIT Vishwaprayag University (2026)</p>

    <h2 style="color:#c8f03c; margin:50px 0 30px;">My Certificates & Photo</h2>

    <div class="gallery">
        <!-- Profile Photo -->
        <div class="item" onclick="openLightbox(this)">
            <img src="photo.jpg" alt="Abed Kazi">
            <div class="label">Profile Photo</div>
        </div>

        <!-- 7 Certificates -->
        <div class="item" onclick="openLightbox(this)">
            <img src="cert1.jpg" alt="Certificate 1">
            <div class="label">Certificate 1</div>
        </div>
        <div class="item" onclick="openLightbox(this)">
            <img src="cert2.jpg" alt="Certificate 2">
            <div class="label">Certificate 2</div>
        </div>
        <div class="item" onclick="openLightbox(this)">
            <img src="cert3.jpg" alt="Certificate 3">
            <div class="label">Certificate 3</div>
        </div>
        <div class="item" onclick="openLightbox(this)">
            <img src="cert4.jpg" alt="Certificate 4">
            <div class="label">Certificate 4</div>
        </div>
        <div class="item" onclick="openLightbox(this)">
            <img src="cert5.jpg" alt="Certificate 5">
            <div class="label">Certificate 5</div>
        </div>
        <div class="item" onclick="openLightbox(this)">
            <img src="cert6.jpg" alt="Certificate 6">
            <div class="label">Certificate 6</div>
        </div>
        <div class="item" onclick="openLightbox(this)">
            <img src="cert7.jpg" alt="Certificate 7">
            <div class="label">Certificate 7</div>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="close" onclick="closeLightbox()">×</span>
        <img id="lightboxImg" src="" alt="">
    </div>

    <script>
        function openLightbox(item) {
            document.getElementById('lightboxImg').src = item.querySelector('img').src;
            document.getElementById('lightbox').style.display = "flex";
        }
        function closeLightbox() {
            document.getElementById('lightbox').style.display = "none";
        }
    </script>

</body>
</html>
