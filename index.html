<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abed Kazi - Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: #f0f0f0;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            font-size: 3.8rem;
            color: #c8f03c;
            margin: 40px 0 10px;
        }
        .subtitle {
            font-size: 1.4rem;
            color: #aaa;
            margin-bottom: 60px;
        }

        /* Profile Photo Section */
        .profile {
            max-width: 320px;
            margin: 0 auto 60px;
        }
        .profile img {
            width: 100%;
            border-radius: 16px;
            border: 4px solid #c8f03c;
            box-shadow: 0 10px 30px rgba(200, 240, 60, 0.3);
        }
        .profile-label {
            margin-top: 15px;
            font-size: 1.1rem;
            color: #c8f03c;
        }

        /* Certificates Gallery */
        h2 {
            color: #c8f03c;
            margin: 70px 0 30px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .cert-item {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
        }
        .cert-item:hover {
            border-color: #c8f03c;
            transform: scale(1.05);
        }
        .cert-item img {
            width: 100%;
            height: auto;
            display: block;
        }
        .cert-label {
            padding: 15px;
            background: #222;
            font-size: 1rem;
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .lightbox img {
            max-width: 92%;
            max-height: 92%;
            border: 10px solid #c8f03c;
            border-radius: 12px;
        }
        .close {
            position: absolute;
            top: 25px;
            right: 35px;
            font-size: 50px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Abed Kazi</h1>
    <p class="subtitle">B.Tech Engineering Student<br>MIT Vishwaprayag University • Class of 2026</p>

    <!-- Profile Photo - Nicer Look -->
    <div class="profile">
        <img src="photo.jpg" alt="Abed Kazi Profile Photo" 
             onerror="this.src='https://via.placeholder.com/320x400/1a1a1a/c8f03c?text=Photo+Not+Found';">
        <div class="profile-label">Profile Photo</div>
    </div>

    <!-- Certificates -->
    <h2>My Certificates</h2>
    
    <div class="gallery">
        <div class="cert-item" onclick="openLightbox(this)">
            <img src="cert1.jpg" alt="Certificate 1" 
                 onerror="this.src='https://via.placeholder.com/600x400/1a1a1a/c8f03c?text=Cert+1+Missing';">
            <div class="cert-label">Certificate 1</div>
        </div>
        <div class="cert-item" onclick="openLightbox(this)">
            <img src="cert2.jpg" alt="Certificate 2" 
                 onerror="this.src='https://via.placeholder.com/600x400/1a1a1a/c8f03c?text=Cert+2+Missing';">
            <div class="cert-label">Certificate 2</div>
        </div>
        <div class="cert-item" onclick="openLightbox(this)">
            <img src="cert3.jpg" alt="Certificate 3" 
                 onerror="this.src='https://via.placeholder.com/600x400/1a1a1a/c8f03c?text=Cert+3+Missing';">
            <div class="cert-label">Certificate 3</div>
        </div>
        <div class="cert-item" onclick="openLightbox(this)">
            <img src="cert4.jpg" alt="Certificate 4" 
                 onerror="this.src='https://via.placeholder.com/600x400/1a1a1a/c8f03c?text=Cert+4+Missing';">
            <div class="cert-label">Certificate 4</div>
        </div>
        <div class="cert-item" onclick="openLightbox(this)">
            <img src="cert5.jpg" alt="Certificate 5" 
                 onerror="this.src='https://via.placeholder.com/600x400/1a1a1a/c8f03c?text=Cert+5+Missing';">
            <div class="cert-label">Certificate 5</div>
        </div>
        <div class="cert-item" onclick="openLightbox(this)">
            <img src="cert6.jpg" alt="Certificate 6" 
                 onerror="this.src='https://via.placeholder.com/600x400/1a1a1a/c8f03c?text=Cert+6+Missing';">
            <div class="cert-label">Certificate 6</div>
        </div>
        <div class="cert-item" onclick="openLightbox(this)">
            <img src="cert7.jpg" alt="Certificate 7" 
                 onerror="this.src='https://via.placeholder.com/600x400/1a1a1a/c8f03c?text=Cert+7+Missing';">
            <div class="cert-label">Certificate 7</div>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="close" onclick="closeLightbox()">×</span>
        <img id="lightboxImg" src="" alt="">
    </div>

    <script>
        function openLightbox(item) {
            document.getElementById('lightboxImg').src = item.querySelector('img').src;
            document.getElementById('lightbox').style.display = "flex";
        }
        function closeLightbox() {
            document.getElementById('lightbox').style.display = "none";
        }
    </script>

</body>
</html>
